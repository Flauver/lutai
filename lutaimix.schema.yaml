__include: lutaiws.schema.yaml:/

schema:
  schema_id: lutaimix
  name: 露台・五二・五三复合顶
  version: "0.1.0"
  author:
    - 深白
  description: |
    单简爽码
  dependencies:
    - snow_sipin_lutai
    - stroke_lutai
    - cangjie5_sc_lutai

engine:
  processors:
    - ascii_composer
    - lua_processor@*lutai.mix_popping
    - recognizer
    - lua_processor@*lutai.add_word_temp*proc
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
    - matcher
    - affix_segmentor@sipin_lutai_lookup
    - affix_segmentor@stroke_lutai_lookup
    - affix_segmentor@cangjie_lutai_lookup
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*lutai.add_word_temp*tran
    - history_translator@history
    - punct_translator
    - table_translator
    - script_translator@sipin_lutai_lookup
    - table_translator@stroke_lutai_lookup
    - table_translator@cangjie_lutai_lookup
  filters:
    - reverse_lookup_filter@reverse_lookup
    - lua_filter@*lutai.pop52tips

history:
  input: '['
  size: 1

__patch:
  - patch
  - lutaimix.custom:/patch?

patch:
  speller/alphabet: "qwrtyuiopasdfghjklzcvbnmex["
  speller/popping/+:
    - match: ".*"
      accept: "["
  translator/dk_select: false
